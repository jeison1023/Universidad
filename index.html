<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Portal Universitario</title>

    <link rel="stylesheet" href="./public/style.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-card">

            <div class="login-header">
                <div class="logo-universidad">
                    <i class="fas fa-university"></i>
                </div>
                <h1>Portal <span class="highlight">Universitario</span></h1>
                <p>Accede a tu información académica</p>
            </div>

            <form id="loginForm" class="login-form">

                <div class="input-group icon-left">
                    <i class="fas fa-user"></i>
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="Usuario"
                        required
                    >
                </div>
                
                <div class="input-group icon-left">
                    <i class="fas fa-lock"></i>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Contraseña"
                        required
                    >
                </div>

                <button type="submit" class="btn-primary full-width login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Iniciar Sesión</span>
                </button>

            </form>

        </div>

        <!-- Loading -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="loading-spinner">
                <i class="fas fa-university fa-spin"></i>
                <p>Entrando...</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();

            showLoading(true);

            // ✅ ACEPTA CUALQUIER USUARIO
            const user = {
                username: username || "usuario",
                nombre: username || "Usuario"
            };

            localStorage.setItem('user', JSON.stringify(user));

            setTimeout(() => {
                window.location.href = 'pages/dashboard.html';
            }, 800);
        });

        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = show ? 'flex' : 'none';
        }
    </script>

</body>
</html>
</html>
