<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes - Portal Universitario</title>

    <!-- ✅ RUTA CORREGIDA -->
    <link rel="stylesheet" href="../public/style.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-graduation-cap"></i>
            <span>Portal UN</span>
        </div>

        <nav class="sidebar-nav">
            <a href="./dashboard.html" class="nav-item">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </a>

            <a href="./materias.html" class="nav-item">
                <i class="fas fa-book"></i> Materias
            </a>

            <a href="./calificaciones.html" class="nav-item">
                <i class="fas fa-chart-line"></i> Calificaciones
            </a>

            <a href="./solicitudes.html" class="nav-item active">
                <i class="fas fa-file-alt"></i> Solicitudes
            </a>

            <a href="./perfil.html" class="nav-item">
                <i class="fas fa-user"></i> Perfil
            </a>

            <a href="#" onclick="logout()" class="nav-item logout">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </a>
        </nav>
    </aside>

    <main class="main-content">

        <header class="header">
            <div class="header-left">
                <button class="menu-toggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h1>Solicitudes</h1>
            </div>

            <div class="header-right">
                <span id="userName" class="user-name"></span>
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
            </div>
        </header>

        <div class="page-content">

            <div class="solicitudes-header">
                <h2>Mis Solicitudes</h2>

                <button class="btn-primary" onclick="openModal('nuevaSolicitud')">
                    <i class="fas fa-plus"></i> Nueva Solicitud
                </button>
            </div>

            <div class="solicitudes-grid">

                <div class="solicitud-card pendiente">
                    <div class="solicitud-header">
                        <h4>Solicitud de Certificado</h4>
                        <span class="status-badge pendiente">Pendiente</span>
                    </div>

                    <p class="fecha">Enviada: 15/10/2024</p>

                    <div class="solicitud-actions">
                        <button class="btn-sm blue">Ver Detalles</button>
                    </div>
                </div>

            </div>

        </div>
    </main>

    <!-- Modal -->
    <div id="nuevaSolicitud" class="modal">
        <div class="modal-content">

            <div class="modal-header">
                <h3>Nueva Solicitud</h3>
                <button class="close-modal" onclick="closeModal('nuevaSolicitud')">&times;</button>
            </div>

            <form class="solicitud-form">
                <select required>
                    <option value="">Tipo de Solicitud</option>
                    <option>Certificado de Estudios</option>
                    <option>Convalidación</option>
                </select>

                <textarea placeholder="Descripción" required></textarea>

                <button type="submit" class="btn-primary">
                    Enviar Solicitud
                </button>
            </form>

        </div>
    </div>

    <!-- ✅ JS CORREGIDO -->
    <script src="../public/main.js"></script>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));

        if (!user) {
            window.location.href = '../index.html';
        } else {
            document.getElementById('userName').textContent = user.nombre || user.username;
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = '../index.html';
        }

        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }
    </script>

</body>
</html>
