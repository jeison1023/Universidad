<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calificaciones - Portal Universitario</title>

    <!-- ✅ RUTA CORREGIDA -->
    <link rel="stylesheet" href="../public/style.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-graduation-cap"></i>
            <span>Portal UN</span>
        </div>

        <nav class="sidebar-nav">
            <a href="./dashboard.html" class="nav-item">
                <i class="fas fa-tachometer-alt"></i>
                Dashboard
            </a>

            <a href="./materias.html" class="nav-item">
                <i class="fas fa-book"></i>
                Materias
            </a>

            <a href="./calificaciones.html" class="nav-item active">
                <i class="fas fa-chart-line"></i>
                Calificaciones
            </a>

            <a href="./solicitudes.html" class="nav-item">
                <i class="fas fa-file-alt"></i>
                Solicitudes
            </a>

            <a href="./perfil.html" class="nav-item">
                <i class="fas fa-user"></i>
                Perfil
            </a>

            <a href="#" onclick="logout()" class="nav-item logout">
                <i class="fas fa-sign-out-alt"></i>
                Cerrar Sesión
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="header-left">
                <button class="menu-toggle"><i class="fas fa-bars"></i></button>
                <h1>Calificaciones</h1>
            </div>

            <div class="header-right">
                <span id="userName" class="user-name"></span>
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
            </div>
        </header>

        <div class="page-content">

            <div class="stats-row">
                <div class="stat-card-large">
                    <h3>4.25</h3>
                    <p>Promedio General</p>
                </div>

                <div class="stat-card-large">
                    <h3>18</h3>
                    <p>Créditos Aprobados</p>
                </div>

                <div class="stat-card-large">
                    <h3>95%</h3>
                    <p>Tasa de Aprobación</p>
                </div>
            </div>

            <div class="table-container">
                <div class="table-header">
                    <h2>Calificaciones por Materia</h2>

                    <select class="periodo-select">
                        <option>2024-I</option>
                        <option>2023-II</option>
                    </select>
                </div>
                
                <div class="table-responsive">
                    <table class="calificaciones-table">
                        <thead>
                            <tr>
                                <th>Materia</th>
                                <th>Nota 1</th>
                                <th>Nota 2</th>
                                <th>Parcial</th>
                                <th>Final</th>
                                <th>Promedio</th>
                                <th>Estado</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr>
                                <td>Matemáticas I</td>
                                <td>4.5</td>
                                <td>4.2</td>
                                <td>4.3</td>
                                <td>4.5</td>
                                <td><strong>4.38</strong></td>
                                <td><span class="status aprobado">Aprobado</span></td>
                            </tr>
                        </tbody>

                    </table>
                </div>
            </div>

        </div>
    </main>

    <!-- ✅ JS CORREGIDO -->
    <script src="../public/main.js"></script>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));

        if (!user) {
            window.location.href = '../index.html';
        } else {
            document.getElementById('userName').textContent = user.nombre || user.username;
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = '../index.html';
        }
    </script>

</body>
</html>
